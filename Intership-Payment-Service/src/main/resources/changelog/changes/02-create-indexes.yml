databaseChangeLog:
  - changeSet:
      id: create-indexes
      author: kanstantsin_halkin
      changes:
        - createIndex:
            collectionName: payments
            indexName: idx_payments_order_id
            keys:
              order_id: 1

        - createIndex:
            collectionName: payments
            indexName: idx_payments_user_id
            keys:
              user_id: 1

        - createIndex:
            collectionName: payments
            indexName: idx_payments_status
            keys:
              status: 1

        - createIndex:
            collectionName: payments
            indexName: idx_payments_timestamp
            keys:
              timestamp: 1

        - createIndex:
            collectionName: payments
            indexName: idx_payments_composite_user_status
            keys:
              user_id: 1
              status: 1

        - createIndex:
            collectionName: payments
            indexName: idx_payments_compound_query
            keys:
              user_id: 1
              status: 1
              timestamp: -1
