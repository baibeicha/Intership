databaseChangeLog:
  - changeSet:
      id: create-payments-collection
      author: kanstantsin_halkin
      changes:
        - createCollection:
            collectionName: payments
            validator:
              $jsonSchema:
                bsonType: "object"
                required: ["order_id", "user_id", "status", "timestamp", "payment_amount"]
                properties:
                  _id:
                    bsonType: "objectId"
                    description: "Auto-generated document ID"
                  order_id:
                    bsonType: "long"
                    description: "Order reference ID"
                  user_id:
                    bsonType: "long"
                    description: "User identifier"
                  status:
                    bsonType: "string"
                    enum: ["SUCCESS", "FAILED"]
                    description: "Payment status"
                  timestamp:
                    bsonType: "timestamp"
                    description: "Payment timestamp"
                  payment_amount:
                    bsonType: "decimal"
                    description: "Payment amount"
                additionalProperties: false
