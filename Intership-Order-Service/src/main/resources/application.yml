spring:
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    consumer:
      group-id: ${CONSUMER_GROUP:order-service-group}
      auto-offset-reset: earliest
      properties:
        spring.json.value.default.type: com.intership.orderservice.model.dto.PaymentResponse
        spring.json.trusted.packages: "*"
        spring.json.use.type.headers: false
  application:
    name: Intership-Order-Service
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yml
    enabled: true

service:
  user: ${USER_SERVICE_URL:http://localhost:8080}
  auth: ${AUTH_SERVICE_URL:http://localhost:9000}

server:
  port: 8081

topic:
  create-order: ${CREATE_ORDER_TOPIC:create-order-topic}
  create-payment: ${CREATE_PAYMENT_TOPIC:create-payment-topic}