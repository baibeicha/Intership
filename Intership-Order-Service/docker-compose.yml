services:
  order-postgres:
    image: postgres:12
    container_name: order-service-postgres
    environment:
      POSTGRES_DB: db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - order-service-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user -d db" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  order-service:
    build: .
    container_name: order-service-app
    ports:
      - "8081:8081"
    environment:
      DB_URL: jdbc:postgresql://order-postgres:5432/db
      DB_USERNAME: user
      DB_PASSWORD: pass
      USER_SERVICE_URL: http://user-service:8080
      AUTH_SERVICE_URL: http://auth-service:9000
    depends_on:
      order-postgres:
        condition: service_healthy
    networks:
      - order-service-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  order-service-network:
    driver: bridge